<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <div class="logo-icon">🏆</div>
          <div class="logo-text">Sistema de<br>Indicações</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="./indicacoes.html" class="nav-item">🎯 Indicações</a>
        <a href="./cadastro.html" class="nav-item">➕ Novo Cadastro</a>
        <a href="./pagamentos.html" class="nav-item">💰 Pagamentos</a>
        <a href="./relatorios.html" class="nav-item active">📈 Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logout-btn">Sair</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Relatórios</h1>
      </div>

      <!-- Filtros -->
      <div class="filter-bar">
        <input type="month" id="mes-relatorio" class="form-control" required>
        <button class="btn btn-accent" id="gerar-relatorio">Gerar Relatório</button>
      </div>

      <!-- Resumo -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="total-indicacoes">0</div>
          <div class="stat-label">Total de Indicações</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-pagos">R$ 0,00</div>
          <div class="stat-label">Valor Pago</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-pendente">R$ 0,00</div>
          <div class="stat-label">Valor Pendente</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-geral">R$ 0,00</div>
          <div class="stat-label">Valor Total</div>
        </div>
      </div>

      <!-- Detalhes -->
      <div class="table-container">
        <h2 style="margin-bottom: 15px;">Detalhamento</h2>
        <table class="data-table">
          <thead>
            <tr>
              <th>Indicado</th>
              <th>Indicador</th>
              <th>Admissão</th>
              <th>Status</th>
              <th>Valor</th>
            </tr>
          </thead>
          <tbody id="relatorio-table">
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px; color: #999;">
                Selecione um mês para visualizar
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../auth.js';
    import { listarIndicacoes, formatDate, STATUS_LABELS } from '../indicacoes.js';

    const user = requireAuth();
    const mesInput = document.getElementById('mes-relatorio');
    const gerarBtn = document.getElementById('gerar-relatorio');
    const logoutBtn = document.getElementById('logout-btn');
    const table = document.getElementById('relatorio-table');
    const totalIndicacoes = document.getElementById('total-indicacoes');
    const totalPagos = document.getElementById('total-pagos');
    const totalPendente = document.getElementById('total-pendente');
    const totalGeral = document.getElementById('total-geral');

    // Definir mês atual
    const hoje = new Date();
    mesInput.valueAsDate = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

    gerarBtn.addEventListener('click', async () => {
      if (!mesInput.value) return alert('Selecione um mês');

      try {
        const todas = await listarIndicacoes();
        
        const [ano, mes] = mesInput.value.split('-').map(Number);
        const filtradas = todas.filter(i => {
          if (!i.dataAdmissao) return false;
          const data = i.dataAdmissao.toDate ? i.dataAdmissao.toDate() : new Date(i.dataAdmissao);
          return data.getFullYear() === ano && (data.getMonth() + 1) === mes;
        });

        // Calcular totais
        let totalPagoVal = 0;
        let totalPendenteVal = 0;
        
        filtradas.forEach(ind => {
          if (ind.status === 'pago') {
            totalPagoVal += ind.valorPremio || 0;
          } else if (ind.status === 'aguardando_pagamento' || ind.status === 'previsto') {
            totalPendenteVal += ind.valorPremio || 0;
          }
        });

        const totalGeralVal = totalPagoVal + totalPendenteVal;

        totalIndicacoes.textContent = filtradas.length;
        totalPagos.textContent = `R$ ${totalPagoVal.toFixed(2)}`;
        totalPendente.textContent = `R$ ${totalPendenteVal.toFixed(2)}`;
        totalGeral.textContent = `R$ ${totalGeralVal.toFixed(2)}`;

        if (filtradas.length === 0) {
          table.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Nenhuma indicação encontrada neste período</td></tr>';
          return;
        }

        table.innerHTML = filtradas.map(ind => `
          <tr>
            <td>${ind.nomeIndicado}</td>
            <td>${ind.nomeIndicador}</td>
            <td>${formatDate(ind.dataAdmissao)}</td>
            <td>${STATUS_LABELS[ind.status] || ind.status}</td>
            <td>R$ ${(ind.valorPremio || 0).toFixed(2)}</td>
          </tr>
        `).join('');
      } catch (e) {
        alert('Erro: ' + e.message);
      }
    });

    logoutBtn.addEventListener('click', logout);
  </script>
</body>
</html>
