<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indicações</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <div class="logo-icon">🏆</div>
          <div class="logo-text">Sistema de<br>Indicações</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="./indicacoes.html" class="nav-item active">🎯 Indicações</a>
        <a href="./cadastro.html" class="nav-item">➕ Novo Cadastro</a>
        <a href="./pagamentos.html" class="nav-item">💰 Pagamentos</a>
        <a href="./relatorios.html" class="nav-item">📈 Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logout-btn">Sair</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Indicações</h1>
        <a href="./cadastro.html" class="btn btn-primary">+ Nova Indicação</a>
      </div>

      <!-- Filtros -->
      <div class="filter-bar">
        <select id="status-filter" class="form-control">
          <option value="todos">Todos os Status</option>
          <option value="previsto">Previsto</option>
          <option value="aguardando_pagamento">Aguardando Pagamento</option>
          <option value="pago">Pago</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <input type="date" id="data-inicio" class="form-control" placeholder="Data Início">
        <input type="date" id="data-fim" class="form-control" placeholder="Data Fim">
        <button class="btn btn-accent" id="filtrar-btn">Filtrar</button>
      </div>

      <!-- Tabela de Indicações -->
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Indicado</th>
              <th>Indicador</th>
              <th>Setor</th>
              <th>Admissão</th>
              <th>Status</th>
              <th>Valor</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="indicacoes-table">
            <tr>
              <td colspan="7" style="text-align: center; padding: 40px;">
                <div class="spinner"></div>
                Carregando...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../auth.js';
    import { listarIndicacoes, formatDate, STATUS_LABELS, STATUS_COLORS } from '../indicacoes.js';

    const user = requireAuth();
    const table = document.getElementById('indicacoes-table');
    const statusFilter = document.getElementById('status-filter');
    const dataInicio = document.getElementById('data-inicio');
    const dataFim = document.getElementById('data-fim');
    const filtrarBtn = document.getElementById('filtrar-btn');
    const logoutBtn = document.getElementById('logout-btn');

    async function carregarIndicacoes() {
      try {
        const filtros = {
          status: statusFilter.value,
          dataInicio: dataInicio.value,
          dataFim: dataFim.value
        };
        const indicacoes = await listarIndicacoes(filtros);
        
        if (indicacoes.length === 0) {
          table.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">Nenhuma indicação encontrada</td></tr>';
          return;
        }

        table.innerHTML = indicacoes.map(ind => `
          <tr>
            <td>${ind.nomeIndicado}</td>
            <td>${ind.nomeIndicador}</td>
            <td>${ind.setorIndicado || '-'}</td>
            <td>${formatDate(ind.dataAdmissao)}</td>
            <td>
              <span class="badge" style="background-color: ${STATUS_COLORS[ind.status]}">
                ${STATUS_LABELS[ind.status] || ind.status}
              </span>
            </td>
            <td>R$ ${ind.valorPremio.toFixed(2)}</td>
            <td>
              <button class="btn-sm" onclick="editarIndicacao('${ind.id}')">Editar</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        table.innerHTML = `<tr><td colspan="7" style="color: red; text-align: center;">Erro: ${e.message}</td></tr>`;
      }
    }

    window.editarIndicacao = (id) => {
      window.location.href = `./cadastro.html?id=${id}`;
    };

    filtrarBtn.addEventListener('click', carregarIndicacoes);
    logoutBtn.addEventListener('click', logout);

    carregarIndicacoes();
  </script>
</body>
</html>
