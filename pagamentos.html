<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamentos</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <div class="logo-icon">🏆</div>
          <div class="logo-text">Sistema de<br>Indicações</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-item">📊 Dashboard</a>
        <a href="./indicacoes.html" class="nav-item">🎯 Indicações</a>
        <a href="./cadastro.html" class="nav-item">➕ Novo Cadastro</a>
        <a href="./pagamentos.html" class="nav-item active">💰 Pagamentos</a>
        <a href="./relatorios.html" class="nav-item">📈 Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logout-btn">Sair</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <h1>Pagamentos Pendentes</h1>
      </div>

      <!-- Tabela de Pagamentos -->
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>Indicado</th>
              <th>Indicador</th>
              <th>Admissão</th>
              <th>Valor</th>
              <th>Previsão</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="pagamentos-table">
            <tr>
              <td colspan="6" style="text-align: center; padding: 40px;">
                <div class="spinner"></div>
                Carregando...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal de Pagamento -->
  <div class="modal-overlay" id="modal-pagamento">
    <div class="modal" style="max-width: 500px;">
      <div class="modal-header">
        <span class="modal-title">Registrar Pagamento</span>
        <button class="modal-close" id="close-modal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Data do Pagamento *</label>
          <input type="date" id="data-pagamento" class="form-control">
        </div>
        <div id="modal-alert"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="confirmar-pagamento">Confirmar</button>
        <button class="btn btn-secondary" id="cancelar-modal">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../auth.js';
    import { listarIndicacoes, formatDate, registrarPagamento } from '../indicacoes.js';

    const user = requireAuth();
    const table = document.getElementById('pagamentos-table');
    const logoutBtn = document.getElementById('logout-btn');
    const modal = document.getElementById('modal-pagamento');
    const dataPagamento = document.getElementById('data-pagamento');
    const modalAlert = document.getElementById('modal-alert');
    let indicacaoAtual = null;

    async function carregarPagamentos() {
      try {
        const filtros = { status: 'aguardando_pagamento' };
        const indicacoes = await listarIndicacoes(filtros);
        
        if (indicacoes.length === 0) {
          table.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Nenhuma indicação aguardando pagamento</td></tr>';
          return;
        }

        table.innerHTML = indicacoes.map(ind => `
          <tr>
            <td>${ind.nomeIndicado}</td>
            <td>${ind.nomeIndicador}</td>
            <td>${formatDate(ind.dataAdmissao)}</td>
            <td>R$ ${ind.valorPremio.toFixed(2)}</td>
            <td>${formatDate(ind.previsaoPagamento)}</td>
            <td>
              <button class="btn-sm" onclick="abrirModalPagamento('${ind.id}', '${ind.nomeIndicado}')">Pagar</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        table.innerHTML = `<tr><td colspan="6" style="color: red; text-align: center;">Erro: ${e.message}</td></tr>`;
      }
    }

    window.abrirModalPagamento = (id, nome) => {
      indicacaoAtual = id;
      dataPagamento.value = new Date().toISOString().split('T')[0];
      modalAlert.innerHTML = `<p style="margin-bottom: 10px;">Registrar pagamento para <strong>${nome}</strong></p>`;
      modal.classList.add('open');
    };

    document.getElementById('confirmar-pagamento').addEventListener('click', async () => {
      if (!dataPagamento.value) {
        modalAlert.innerHTML = '<div class="alert alert-error">Selecione a data</div>';
        return;
      }

      try {
        await registrarPagamento(indicacaoAtual, dataPagamento.value, user.uid);
        modal.classList.remove('open');
        carregarPagamentos();
        alert('Pagamento registrado com sucesso!');
      } catch (e) {
        modalAlert.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
      }
    });

    document.getElementById('cancelar-modal').addEventListener('click', () => {
      modal.classList.remove('open');
    });

    document.getElementById('close-modal').addEventListener('click', () => {
      modal.classList.remove('open');
    });

    logoutBtn.addEventListener('click', logout);

    carregarPagamentos();
  </script>
</body>
</html>
